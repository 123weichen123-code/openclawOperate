<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技术资源导航 | Tech Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            padding: 40px 0;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            color: #888;
            font-size: 1.1rem;
        }
        
        .filters {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
        }
        
        .filter-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }
        
        .filter-group label {
            color: #aaa;
            font-weight: 500;
        }
        
        select, input {
            padding: 10px 15px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
        }
        
        select:focus, input:focus {
            border-color: #00d4ff;
            box-shadow: 0 0 10px rgba(0,212,255,0.2);
        }
        
        select option {
            background: #1a1a2e;
        }
        
        .search-box {
            flex: 1;
            min-width: 200px;
        }
        
        .search-box input {
            width: 100%;
        }
        
        .categories {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 15px;
        }
        
        .category-tag {
            padding: 8px 16px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }
        
        .category-tag:hover, .category-tag.active {
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            border-color: transparent;
        }
        
        .stats {
            text-align: center;
            color: #666;
            margin-bottom: 20px;
            font-size: 14px;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }
        
        .card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .card:hover {
            transform: translateY(-4px);
            border-color: rgba(0,212,255,0.3);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        
        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        
        .card-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            background: linear-gradient(135deg, #00d4ff20, #7c3aed20);
        }
        
        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
        }
        
        .card-desc {
            color: #888;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 15px;
        }
        
        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        
        .tag {
            padding: 4px 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            font-size: 12px;
            color: #00d4ff;
        }
        
        .card-lang {
            position: absolute;
            top: 12px;
            right: 12px;
            padding: 4px 8px;
            background: rgba(124, 58, 237, 0.3);
            border-radius: 6px;
            font-size: 11px;
        }
        
        .card {
            position: relative;
        }
        
        .no-result {
            text-align: center;
            padding: 60px;
            color: #666;
        }
        
        footer {
            text-align: center;
            padding: 40px;
            color: #444;
            font-size: 14px;
        }
        
        @media (max-width: 768px) {
            h1 { font-size: 1.8rem; }
            .grid { grid-template-columns: 1fr; }
            .filter-group { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🛠️ 技术资源导航</h1>
            <p class="subtitle">开发者工具、AI、文档、运行时一站式入口</p>
        </header>
        
        <div class="filters">
            <div class="filter-group">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="搜索网站名称或描述..." oninput="filterSites()">
                </div>
                <select id="langFilter" onchange="filterSites()">
                    <option value="all">所有语言</option>
                    <option value="zh">中文</option>
                    <option value="en">English</option>
                </select>
                <select id="sortFilter" onchange="filterSites()">
                    <option value="name">按名称</option>
                    <option value="popular">按热度</option>
                </select>
            </div>
            <div class="categories" id="categoryTags">
                <span class="category-tag active" data-cat="all">全部</span>
                <span class="category-tag" data-cat="ai">AI / LLM</span>
                <span class="category-tag" data-cat="doc">文档</span>
                <span class="category-tag" data-cat="dev">开发工具</span>
                <span class="category-tag" data-cat="cloud">云服务</span>
                <span class="category-tag" data-cat="learn">学习</span>
                <span class="category-tag" data-cat="tool">工具</span>
                <span class="category-tag" data-cat="community">社区</span>
            </div>
        </div>
        
        <div class="stats" id="stats">共收录 <span id="totalCount">0</span> 个网站</div>
        
        <div class="grid" id="siteGrid"></div>
        
        <div class="no-result" id="noResult" style="display:none;">
            <p>没有找到匹配的资源 😢</p>
        </div>
        
        <footer>
            <p>最后更新: 2026-03-15 | 按热度排序仅供演示</p>
        </footer>
    </div>

    <script>
        const sites = [
            // AI / LLM
            { name: "OpenAI", url: "https://openai.com", desc: "GPT 系列模型创造者，提供 API 和 ChatGPT", category: ["ai"], lang: "en", popular: 100, icon: "🧠" },
            { name: "Anthropic", url: "https://www.anthropic.com", desc: "Claude AI 开发商，专注安全可控的 AI", category: ["ai"], lang: "en", popular: 95, icon: "🔵" },
            { name: "Google AI", url: "https://ai.google", desc: "Gemini, PaLM 等模型", category: ["ai"], lang: "en", popular: 90, icon: "🌐" },
            { name: "文心一言", url: "https://yiyan.baidu.com", desc: "百度 AI 对话助手", category: ["ai"], lang: "zh", popular: 85, icon: "🐉" },
            { name: "通义千问", url: "https://tongyi.aliyun.com", desc: "阿里云 AI 助手", category: ["ai"], lang: "zh", popular: 80, icon: "🐎" },
            { name: "Kimi", url: "https://kimi.moonshot.cn", desc: "月之暗面 AI，长上下文处理", category: ["ai"], lang: "zh", popular: 88, icon: "🌙" },
            { name: "DeepSeek", url: "https://www.deepseek.com", desc: "开源大模型，API 便宜", category: ["ai"], lang: "en", popular: 92, icon: "🔍" },
            { name: "Groq", url: "https://groq.com", desc: "超快推理速度的 LLM API", category: ["ai"], lang: "en", popular: 75, icon: "⚡" },
            
            // 开发工具
            { name: "GitHub", url: "https://github.com", desc: "全球最大代码托管平台", category: ["dev", "community"], lang: "en", popular: 98, icon: "🐙" },
            { name: "GitLab", url: "https://gitlab.com", desc: "开源代码仓库与 DevOps 平台", category: ["dev"], lang: "en", popular: 85, icon: "🦊" },
            { name: "Vercel", url: "https://vercel.com", desc: "前端部署与 Edge Functions", category: ["dev", "cloud"], lang: "en", popular: 88, icon: "▲" },
            { name: "Cloudflare", url: "https://www.cloudflare.com", desc: "CDN、DNS、Workers 边缘计算", category: ["dev", "cloud", "tool"], lang: "en", popular: 86, icon: "☁️" },
            { name: "Docker", url: "https://www.docker.com", desc: "容器化平台", category: ["dev"], lang: "en", popular: 90, icon: "🐳" },
            { name: "Postman", url: "https://www.postman.com", desc: "API 测试与调试", category: ["dev", "tool"], lang: "en", popular: 82, icon: "📮" },
            { name: "VS Code", url: "https://code.visualstudio.com", desc: "微软开源代码编辑器", category: ["dev"], lang: "en", popular: 95, icon: "💙" },
            { name: "Cursor", url: "https://cursor.sh", desc: "AI 增强的代码编辑器", category: ["dev", "ai"], lang: "en", popular: 93, icon: "🎯" },
            { name: "Windsurf", url: "https://codeium.com/windsurf", desc: "AI 驱动的 IDE", category: ["dev", "ai"], lang: "en", popular: 80, icon: "🏄" },
            
            // 文档
            { name: "MDN Web Docs", url: "https://developer.mozilla.org", desc: "Web 技术权威文档", category: ["doc", "learn"], lang: "en", popular: 94, icon: "🦊" },
            { name: "React Docs", url: "https://react.dev", desc: "React 官方文档", category: ["doc", "learn"], lang: "en", popular: 92, icon: "⚛️" },
            { name: "Vue.js", url: "https://vuejs.org", desc: "Vue 官方文档", category: ["doc", "learn"], lang: "en", popular: 88, icon: "💚" },
            { name: "Node.js", url: "https://nodejs.org", desc: "Node.js 官方文档", category: ["doc", "dev"], lang: "en", popular: 89, icon: "🟢" },
            { name: "TypeScript", url: "https://www.typescriptlang.org", desc: "TypeScript 官方", category: ["doc", "dev"], lang: "en", popular: 90, icon: "🔷" },
            { name: "Rust", url: "https://www.rust-lang.org", desc: "Rust 编程语言", category: ["doc", "dev"], lang: "en", popular: 85, icon: "🦀" },
            { name: "Go", url: "https://go.dev", desc: "Go 语言官方", category: ["doc", "dev"], lang: "en", popular: 86, icon: "🐹" },
            
            // 云服务
            { name: "AWS", url: "https://aws.amazon.com", desc: "亚马逊云服务", category: ["cloud"], lang: "en", popular: 91, icon: "📦" },
            { name: "阿里云", url: "https://www.aliyun.com", desc: "阿里巴巴云计算", category: ["cloud"], lang: "zh", popular: 88, icon: "🏠" },
            { name: "腾讯云", url: "https://cloud.tencent.com", desc: "腾讯云服务", category: ["cloud"], lang: "zh", popular: 80, icon: "🐧" },
            { name: "Vultr", url: "https://www.vultr.com", desc: "高性价比云服务器", category: ["cloud"], lang: "en", popular: 75, icon: "🚀" },
            { name: "Railway", url: "https://railway.app", desc: "简化部署的云平台", category: ["cloud", "dev"], lang: "en", popular: 78, icon: "🚂" },
            
            // 学习
            { name: "MDN", url: "https://developer.mozilla.org", desc: "Web 开发学习资源", category: ["learn", "doc"], lang: "en", popular: 95, icon: "🌐" },
            { name: "freeCodeCamp", url: "https://www.freecodecamp.org", desc: "免费编程学习平台", category: ["learn"], lang: "en", popular: 90, icon: "🔥" },
            { name: "LeetCode", url: "https://leetcode.com", desc: "算法刷题平台", category: ["learn"], lang: "en", popular: 88, icon: "🏋️" },
            { name: "牛客网", url: "https://www.nowcoder.com", desc: "国内算法面试", category: ["learn"], lang: "zh", popular: 82, icon: "🐮" },
            { name: "Bilibili", url: "https://www.bilibili.com", desc: "技术教程视频丰富", category: ["learn"], lang: "zh", popular: 85, icon: "📺" },
            
            // 工具
            { name: "Canva", url: "https://www.canva.com", desc: "在线设计工具", category: ["tool"], lang: "en", popular: 80, icon: "🎨" },
            { name: "Figma", url: "https://www.figma.com", desc: "协作 UI 设计", category: ["tool"], lang: "en", popular: 87, icon: "🎯" },
            { name: "Notion", url: "https://www.notion.so", desc: "笔记与知识管理", category: ["tool"], lang: "en", popular: 85, icon: "📝" },
            { name: "Raycast", url: "https://www.raycast.com", desc: "Mac 效率工具", category: ["tool"], lang: "en", popular: 82, icon: "⚡" },
            { name: "uTools", url: "https://www.utools.cn", desc: "Windows/Mac 效率工具", category: ["tool"], lang: "zh", popular: 75, icon: "🛠️" },
            { name: "V2EX", url: "https://www.v2ex.com", desc: "程序员社区", category: ["community", "tool"], lang: "zh", popular: 80, icon: "💬" },
            
            // 社区
            { name: "Stack Overflow", url: "https://stackoverflow.com", desc: "程序员问答社区", category: ["community"], lang: "en", popular: 93, icon: "📚" },
            { name: "Reddit", url: "https://www.reddit.com", desc: "匿名社区，含 r/programming", category: ["community"], lang: "en", popular: 85, icon: "🤖" },
            { name: "Twitter/X", url: "https://twitter.com", desc: "科技动态热点", category: ["community"], lang: "en", popular: 80, icon: "🐦" },
            { name: "稀土掘金", url: "https://juejin.cn", desc: "国内技术社区", category: ["community", "learn"], lang: "zh", popular: 82, icon: "⛏️" },
            { name: "SegmentFault", url: "https://segmentfault.com", desc: "思否技术问答", category: ["community"], lang: "zh", popular: 78, icon: "⚡" },
            
            // OpenClaw 相关
            { name: "OpenClaw", url: "https://docs.openclaw.ai", desc: "自托管 AI 网关文档", category: ["dev", "ai", "tool"], lang: "en", popular: 70, icon: "🦞" },
            { name: "ClawHub", url: "https://clawhub.com", desc: "OpenClaw 技能市场", category: ["dev", "tool"], lang: "en", popular: 72, icon: "🧑‍💻" },
        ];

        let currentCategory = 'all';

        // 分类标签点击事件
        document.querySelectorAll('.category-tag').forEach(tag => {
            tag.addEventListener('click', () => {
                document.querySelectorAll('.category-tag').forEach(t => t.classList.remove('active'));
                tag.classList.add('active');
                currentCategory = tag.dataset.cat;
                filterSites();
            });
        });

        function filterSites() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const lang = document.getElementById('langFilter').value;
            const sort = document.getElementById('sortFilter').value;
            
            let filtered = sites.filter(site => {
                const matchSearch = site.name.toLowerCase().includes(search) || 
                                   site.desc.toLowerCase().includes(search);
                const matchLang = lang === 'all' || site.lang === lang;
                const matchCat = currentCategory === 'all' || site.category.includes(currentCategory);
                return matchSearch && matchLang && matchCat;
            });

            // 排序
            filtered.sort((a, b) => {
                if (sort === 'popular') return b.popular - a.popular;
                return a.name.localeCompare(b.name, 'zh-CN');
            });

            renderSites(filtered);
        }

        function renderSites(sitesToRender) {
            const grid = document.getElementById('siteGrid');
            const noResult = document.getElementById('noResult');
            const totalCount = document.getElementById('totalCount');
            
            totalCount.textContent = sitesToRender.length;
            
            if (sitesToRender.length === 0) {
                grid.innerHTML = '';
                noResult.style.display = 'block';
                return;
            }
            
            noResult.style.display = 'none';
            
            grid.innerHTML = sitesToRender.map(site => `
                <div class="card" onclick="window.open('${site.url}', '_blank')">
                    <span class="card-lang">${site.lang === 'zh' ? '中文' : 'EN'}</span>
                    <div class="card-header">
                        <div class="card-icon">${site.icon}</div>
                        <div class="card-title">${site.name}</div>
                    </div>
                    <p class="card-desc">${site.desc}</p>
                    <div class="card-tags">
                        ${site.category.map(cat => `<span class="tag">${getCategoryName(cat)}</span>`).join('')}
                    </div>
                </div>
            `).join('');
        }

        function getCategoryName(cat) {
            const map = {
                ai: 'AI',
                doc: '文档',
                dev: '开发',
                cloud: '云服务',
                learn: '学习',
                tool: '工具',
                community: '社区'
            };
            return map[cat] || cat;
        }

        // 初始化
        filterSites();
    </script>
</body>
</html>
